
name: Platform app CI

on:
  push:
    branches: [main]

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/platform-app

jobs:
  
  build-and-push:
    name: Build & Push Image on DockerHub registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to DockerHub using repository secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Use Docker Buildx for efficient multi-stage builds with caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push the image tagged with the git commit SHA
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}
            ${{ env.DOCKERHUB_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
